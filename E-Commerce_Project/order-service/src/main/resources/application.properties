spring.application.name=order-service
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/order?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ───────── Spring RabbitMQ ─────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Connection / template settings
spring.rabbitmq.connection-timeout=10000
spring.rabbitmq.template.reply-timeout=5000

# ───────── Custom RabbitMQ Config ─────────
rabbitmq.exchange=shopflow.events


# Queues
rabbitmq.queues.order-placed=order.placed.queue
rabbitmq.queues.order-cancelled=order.cancelled.queue
rabbitmq.queues.payment-completed=payment.completed.queue
rabbitmq.queues.payment-failed=payment.failed.queue
rabbitmq.queues.payment-refunded=payment.refunded.queue
rabbitmq.queues.user-registered=user.registered.queue
rabbitmq.queues.password-reset=password.reset.queue
rabbitmq.queues.order-status-updated=order.status.updated.queue

# Routing Keys
rabbitmq.routing-keys.order-placed=order.placed
rabbitmq.routing-keys.order-cancelled=order.cancelled
rabbitmq.routing-keys.payment-completed=payment.completed
rabbitmq.routing-keys.payment-failed=payment.failed
rabbitmq.routing-keys.payment-refunded=payment.refunded
rabbitmq.routing-keys.user-registered=user.registered
rabbitmq.routing-keys.password-reset=password.reset
rabbitmq.routing-keys.order-status-updated=order.status.updated

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true



logging.level.com.order=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.springframework.amqp=DEBUG
logging.level.org.springframework.rabbit=DEBUG

# eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# eureka.instance.prefer-ip-address=true

order.cancellation-window-minutes = 60
services.product-service = http://localhost:8083
services.payment-service = http://localhost:8085